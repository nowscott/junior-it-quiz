name: Release and Version Bump

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # 防止机器人自己的提交造成死循环触发
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 注意：如果这个 Release 创建后还需要触发其他的部署 Action，
          # 请在仓库 Settings -> Secrets 中创建一个 Personal Access Token (PAT)，
          # 并将下面的 GITHUB_TOKEN 替换为你的 PAT，例如：token: ${{ secrets.MY_PAT }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # 【优化1】移除了不必要的 npm ci 步骤，节省 CI 运行时间

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        id: version
        run: |
          BUMP_TYPE="patch"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          
          # 【优化2】修正版本判断逻辑，修复优先级倒置和误判问题
          # 1. 优先判断是否包含 BREAKING CHANGE
          if grep -q "BREAKING CHANGE:" <<< "$COMMIT_MSG"; then
            BUMP_TYPE="major"
          # 2. 判断提交信息是否以 feat: 或 feat( 开头（支持换行符后的新行）
          elif grep -qE "(^|[$'\n'])feat(\(|:)" <<< "$COMMIT_MSG"; then
            BUMP_TYPE="minor"
          fi
          
          echo "Bumping version type: $BUMP_TYPE"
          
          # 更新 package.json 版本
          npm version $BUMP_TYPE -m "chore(release): %s"
          
          # 获取新版本号
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # 推送变更和标签
          git push origin HEAD --follow-tags

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to developer branch
        run: |
          git fetch origin developer
          git checkout developer
          
          # 【优化3】增加合并冲突保护机制
          echo "正在尝试将 ${{ github.ref_name }} 合并到 developer..."
          
          if git merge ${{ github.ref_name }} --no-edit; then
            echo "合并成功，准备推送到远程仓库..."
            git push origin developer
          else
            echo "::error::检测到合并冲突！已中止自动合并。请手动将 ${{ github.ref_name }} 分支的更改合并到 developer。"
            git merge --abort
            exit 1 # 让此步骤报错，提醒开发者手动处理
          fi